<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WoW Hotfix Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#c8a45e;--goldb:#f0c96a;--goldd:#6a5528;
  --bg0:#060810;--bg2:#10151f;--bg3:#151c28;--bg4:#1c2436;
  --brd:rgba(200,164,94,.18);--brdh:rgba(200,164,94,.5);
  --tx:#ccc0a8;--txd:#6e6658;--txb:#ece4d0;
  --g:#39b36a;--gbg:rgba(57,179,106,.12);--gbr:rgba(57,179,106,.32);
  --r:#d44;--rbg:rgba(221,68,68,.12);--rbr:rgba(221,68,68,.32);
  --b:#4d8ec4;--bbg:rgba(77,142,196,.1);--bbr:rgba(77,142,196,.3);
  --pur:#9554d6;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Rajdhani',sans-serif;background:var(--bg0);color:var(--tx);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 100% 60% at 50% -5%,rgba(149,84,214,.08) 0%,transparent 60%),
  radial-gradient(ellipse 60% 40% at 95% 95%,rgba(77,142,196,.06) 0%,transparent 50%),
  radial-gradient(ellipse 40% 30% at 0% 80%,rgba(200,164,94,.04) 0%,transparent 50%);}

header{position:sticky;top:0;z-index:300;background:rgba(6,8,16,.94);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--brd);height:58px;display:flex;align-items:center;padding:0 26px;gap:16px;}
.logo{display:flex;align-items:center;gap:10px;font-family:'Cinzel',serif;font-size:17px;font-weight:700;
  color:var(--goldb);text-shadow:0 0 20px rgba(240,201,106,.3);white-space:nowrap;flex-shrink:0;}
.nav{display:flex;gap:3px;overflow-x:auto;scrollbar-width:none;flex:1;}
.nb{padding:5px 14px;border-radius:5px;border:1px solid transparent;cursor:pointer;
  font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;letter-spacing:.5px;white-space:nowrap;
  transition:all .16s;background:transparent;color:var(--txd);}
.nb:hover{color:var(--tx);background:rgba(255,255,255,.04);}
.nb.on{color:var(--gold);border-color:var(--brd);background:rgba(200,164,94,.07);}
.hdr-r{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:11px;color:var(--txd);white-space:nowrap;flex-shrink:0;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--g);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(57,179,106,.5)}50%{box-shadow:0 0 0 5px transparent;opacity:.6}}

.main{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:26px 20px;}
.view{display:none;animation:fi .25s ease;}
.view.on{display:block;}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.stitle{font-family:'Cinzel',serif;font-size:15px;font-weight:600;color:var(--gold);
  margin-bottom:16px;display:flex;align-items:center;gap:12px;}
.stitle::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--brd),transparent);}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:26px;}
.stat{background:var(--bg2);border:1px solid var(--brd);border-radius:10px;padding:18px 20px;position:relative;overflow:hidden;}
.stat::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(200,164,94,.03),transparent 55%);pointer-events:none;}
.sl{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--txd);margin-bottom:5px;}
.sv{font-family:'Cinzel',serif;font-size:28px;font-weight:700;color:var(--goldb);line-height:1.1;}
.ss{font-size:11px;color:var(--txd);margin-top:4px;}

/* HOTFIX ARCHIVE */
.hfl{display:flex;flex-direction:column;gap:8px;}
.hf{background:var(--bg2);border:1px solid var(--brd);border-radius:10px;overflow:hidden;transition:border-color .16s;}
.hf:hover{border-color:var(--brdh);}
.hf-hd{display:flex;align-items:center;gap:12px;padding:13px 16px;cursor:pointer;user-select:none;}
.hf-title{font-family:'Cinzel',serif;font-size:13px;font-weight:600;color:var(--gold);flex-shrink:0;}
.hf-tags{display:flex;gap:4px;flex-wrap:wrap;flex:1;}
.tag{font-size:10px;font-weight:700;letter-spacing:.4px;padding:2px 8px;border-radius:20px;border:1px solid;}
.tc{border-color:rgba(77,142,196,.4);color:var(--b);background:rgba(77,142,196,.08);}
.tr{border-color:rgba(221,68,68,.35);color:#d44;background:rgba(221,68,68,.08);}
.tp{border-color:rgba(149,84,214,.35);color:var(--pur);background:rgba(149,84,214,.08);}
.ti{border-color:rgba(57,179,106,.35);color:var(--g);background:rgba(57,179,106,.08);}
.tq{border-color:rgba(210,120,40,.35);color:#d28020;background:rgba(210,120,40,.08);}
.tf{border-color:rgba(110,155,70,.35);color:#6e9b46;background:rgba(110,155,70,.08);}
.tg{border-color:rgba(200,164,94,.35);color:var(--gold);background:rgba(200,164,94,.08);}
.hf-cv{font-size:14px;color:var(--txd);transition:transform .18s;margin-left:auto;flex-shrink:0;}
.hf.open .hf-cv{transform:rotate(180deg);color:var(--gold);}
.hf-bd{display:none;border-top:1px solid var(--brd);padding:16px;}
.hf.open .hf-bd{display:block;}

/* Archive sections */
.a-sec{margin-bottom:14px;}
.a-sec:last-child{margin-bottom:0;}
.a-sec-title{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--goldd);margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.a-sec-title::before{content:'◆';font-size:7px;}

/* Archive spec block */
.a-spec{margin-bottom:8px;background:rgba(255,255,255,.015);border-radius:6px;border:1px solid rgba(255,255,255,.05);overflow:hidden;}
.a-spec-hd{display:flex;align-items:center;gap:8px;padding:5px 10px;background:rgba(255,255,255,.02);border-bottom:1px solid rgba(255,255,255,.04);}
.a-spec-hd .si-img{width:20px;height:20px;border-radius:4px;flex-shrink:0;}
.a-spec-name{font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--txb);}
.a-entry{display:flex;align-items:flex-start;gap:8px;padding:5px 10px;border-bottom:1px solid rgba(255,255,255,.03);}
.a-entry:last-child{border-bottom:none;}
.a-entry-dot{width:4px;height:4px;border-radius:50%;background:var(--txd);flex-shrink:0;margin-top:6px;}
.a-entry-txt{font-size:12px;line-height:1.5;color:var(--tx);flex:1;}

/* BADGES */
.cb{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:700;
  padding:1px 7px;border-radius:4px;margin-left:5px;vertical-align:middle;white-space:nowrap;}
.cup{background:var(--gbg);color:var(--g);border:1px solid var(--gbr);}
.cdn{background:var(--rbg);color:var(--r);border:1px solid var(--rbr);}
.cfx{background:var(--bbg);color:var(--b);border:1px solid var(--bbr);}

.orig-link{display:inline-flex;align-items:center;gap:5px;margin-top:12px;padding-top:10px;
  border-top:1px solid var(--brd);color:var(--gold);font-size:12px;text-decoration:none;opacity:.75;transition:opacity .15s;}
.orig-link:hover{opacity:1;}

/* CLASS GRID */
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(115px,1fr));gap:9px;margin-bottom:26px;}
.cbtn{position:relative;border-radius:9px;overflow:hidden;cursor:pointer;border:2px solid transparent;
  transition:all .2s;aspect-ratio:1;display:flex;flex-direction:column;align-items:center;
  justify-content:flex-end;padding:9px 6px;background:var(--bg2);}
.cbtn:hover{transform:translateY(-3px);box-shadow:0 8px 22px rgba(0,0,0,.5);}
.cbtn.sel{border-color:var(--gold);box-shadow:0 0 18px rgba(200,164,94,.28);}
.cbg{position:absolute;inset:0;background-size:cover;background-position:center;opacity:.28;transition:opacity .2s;}
.cbtn:hover .cbg,.cbtn.sel .cbg{opacity:.5;}
.cov{position:absolute;inset:0;background:linear-gradient(0deg,rgba(6,8,16,.9) 0%,transparent 60%);}
.cnm{position:relative;z-index:1;font-family:'Cinzel',serif;font-size:10px;font-weight:600;
  text-align:center;color:var(--txb);text-shadow:0 1px 4px rgba(0,0,0,.9);}
.cdot{position:absolute;top:7px;right:7px;z-index:2;width:7px;height:7px;border-radius:50%;}
.hch .cdot{background:var(--goldb);box-shadow:0 0 7px var(--gold);}

/* CLASS DETAIL */
.cdp{display:none;background:var(--bg2);border:1px solid var(--brd);border-radius:12px;overflow:hidden;margin-bottom:26px;}
.cdp.on{display:block;animation:fi .25s ease;}
.cdh{position:relative;height:155px;display:flex;align-items:flex-end;padding:20px 24px;overflow:hidden;}
.cdhbg{position:absolute;inset:0;background-size:cover;background-position:center top;filter:brightness(.35) saturate(1.3);}
.cdhgr{position:absolute;inset:0;background:linear-gradient(0deg,var(--bg2) 0%,transparent 55%);}
.cdhi{position:relative;z-index:1;}
.cdhn{font-family:'Cinzel',serif;font-size:26px;font-weight:700;color:var(--txb);}
.cdhs{font-size:11px;color:var(--txd);margin-top:3px;}
.cdbody{padding:20px 24px;}

/* SPEC SECTION in class detail */
.spec-block{margin-bottom:16px;border-radius:8px;overflow:hidden;border:1px solid rgba(255,255,255,.07);}
.spec-block:last-child{margin-bottom:0;}
.spec-hd{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg4);border-bottom:1px solid rgba(255,255,255,.06);}
.spec-hd-icon{width:20px;height:20px;border-radius:4px;flex-shrink:0;object-fit:cover;}
.spec-hd .si-img{width:22px;height:22px;border-radius:5px;flex-shrink:0;}
.spec-hd-name{font-family:'Cinzel',serif;font-size:12px;font-weight:600;color:var(--goldb);}
.spec-hd-counts{display:flex;gap:5px;margin-left:auto;}

/* Spell row inside spec block */
.sr{display:flex;align-items:flex-start;gap:12px;padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.04);transition:background .15s;}
.sr:last-child{border-bottom:none;}
.sr:hover{background:rgba(255,255,255,.03);}
.si{width:34px;height:34px;border-radius:6px;flex-shrink:0;background:var(--bg0);
  display:flex;align-items:center;justify-content:center;font-size:15px;border:1px solid var(--brd);}
.si-img{width:34px;height:34px;border-radius:6px;flex-shrink:0;object-fit:cover;
  border:1px solid rgba(200,164,94,.25);display:block;}
.si-ph{width:34px;height:34px;border-radius:6px;flex-shrink:0;background:var(--bg0);
  display:flex;align-items:center;justify-content:center;font-size:13px;
  color:var(--txd);border:1px solid var(--brd);}
.sinfo{flex:1;}
.sname{font-size:13px;font-weight:700;color:var(--txb);margin-bottom:1px;}
.sdesc{font-size:12px;color:var(--tx);line-height:1.5;}
.snum{text-align:center;flex-shrink:0;min-width:50px;}
.bn{font-family:'Cinzel',serif;font-size:16px;font-weight:700;}
.bup{color:var(--g);text-shadow:0 0 10px rgba(57,179,106,.4);}
.bdn{color:var(--r);text-shadow:0 0 10px rgba(221,68,68,.4);}
.bnl{font-size:10px;color:var(--txd);margin-top:1px;}

/* SORT DIVIDERS */
.sort-sep{display:flex;align-items:center;gap:6px;padding:4px 12px;
  font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
.sort-sep.buffs{color:var(--g);background:rgba(57,179,106,.06);}
.sort-sep.nerfs{color:var(--r);background:rgba(221,68,68,.06);}
.sort-sep.fixes{color:var(--b);background:rgba(77,142,196,.06);}

/* DASHBOARD CARDS */
.dg{display:grid;grid-template-columns:repeat(auto-fill,minmax(285px,1fr));gap:16px;}
.dc{border-radius:10px;overflow:hidden;border:1px solid var(--brd);background:var(--bg2);
  transition:transform .18s,box-shadow .18s;cursor:pointer;}
.dc:hover{transform:translateY(-4px);box-shadow:0 12px 28px rgba(0,0,0,.55);}
.dcb{position:relative;height:85px;overflow:hidden;}
.dcbg{position:absolute;inset:0;background-size:cover;background-position:center;transition:transform .26s;}
.dc:hover .dcbg{transform:scale(1.06);}
.dcgr{position:absolute;inset:0;background:linear-gradient(180deg,transparent 0%,var(--bg2) 100%);}
.dcn{position:absolute;bottom:7px;left:11px;font-family:'Cinzel',serif;font-size:13px;font-weight:700;
  color:var(--txb);text-shadow:0 2px 6px rgba(0,0,0,.9);}
.dcbar{height:3px;}
.dcbd{padding:11px;}

/* Dashboard spec group inside card */
.dc-spec{margin-bottom:8px;}
.dc-spec-name{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;
  color:var(--txd);margin-bottom:4px;padding-bottom:3px;border-bottom:1px solid rgba(255,255,255,.05);}
.dc-e{display:flex;align-items:center;justify-content:space-between;padding:3px 0;font-size:12px;}
.dc-el{color:var(--tx);flex:1;padding-right:7px;line-height:1.3;}
.dc-empty{font-size:11px;color:var(--txd);font-style:italic;padding:5px 0;}

::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--brd);border-radius:3px;}

@media(max-width:900px){.stats{grid-template-columns:1fr 1fr;}}
@media(max-width:600px){.stats{grid-template-columns:1fr;}header{padding:0 12px;}.logo span:not(:first-child){display:none;}}

/* ═══ POSTAVY ════════════════════════════════════════════ */
.char-wrap{display:grid;grid-template-columns:320px 1fr;gap:20px;align-items:start;}
@media(max-width:900px){.char-wrap{grid-template-columns:1fr;}}

/* Levý panel — portrét + info */
.char-card{background:var(--bg2);border:1px solid var(--brd);border-radius:14px;overflow:hidden;position:sticky;top:78px;}
.char-render{position:relative;width:100%;aspect-ratio:3/4;overflow:hidden;background:var(--bg0);}
.char-render img{width:100%;height:100%;object-fit:cover;object-position:top center;display:block;}
.char-render-overlay{position:absolute;inset:0;background:linear-gradient(0deg,var(--bg2) 0%,rgba(6,8,16,.2) 60%,transparent 100%);}
.char-info{padding:16px 18px 20px;}
.char-name{font-family:'Cinzel',serif;font-size:24px;font-weight:700;color:#fff;line-height:1.1;text-shadow:0 2px 8px rgba(0,0,0,.5);}
.char-sub{font-size:14px;color:var(--txb);margin-top:5px;letter-spacing:.3px;line-height:1.5;}
.char-sub-realm{font-size:13px;color:var(--gold);margin-top:3px;letter-spacing:.3px;opacity:.85;}
.char-ilvl-box{margin-top:14px;background:var(--bg3);border:1px solid var(--brd);border-radius:8px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;}
.char-ilvl-num{font-family:'Cinzel',serif;font-size:26px;font-weight:700;color:var(--goldb);text-shadow:0 0 20px rgba(240,201,106,.35);}
.char-ilvl-lbl{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--txd);margin-top:2px;}
.char-stats{margin-top:12px;display:flex;flex-direction:column;gap:4px;}
.char-stat-row{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.char-stat-row:last-child{border-bottom:none;}
.char-stat-label{color:var(--txd);}
.char-stat-val{color:var(--txb);font-weight:600;}

/* Pravý panel — výbava (old list, kept for reference) */
.equip-panel{background:var(--bg2);border:1px solid var(--brd);border-radius:14px;padding:20px;}
.equip-grid{display:flex;flex-direction:column;gap:6px;}
.equip-slot{display:flex;align-items:center;gap:12px;padding:9px 12px;border-radius:8px;background:var(--bg3);border:1px solid rgba(255,255,255,.05);transition:border-color .15s,background .15s;cursor:default;}
.equip-slot:hover{border-color:var(--brdh);background:var(--bg4);}
.equip-slot.empty{opacity:.35;}
.equip-icon-wrap{position:relative;flex-shrink:0;}
.equip-icon{width:40px;height:40px;border-radius:6px;border:2px solid var(--brd);object-fit:cover;background:var(--bg0);display:block;}
.equip-icon-ph{width:40px;height:40px;border-radius:6px;border:2px solid rgba(255,255,255,.07);background:var(--bg0);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.equip-ilvl-badge{position:absolute;bottom:-4px;right:-4px;background:var(--bg0);border:1px solid var(--brd);border-radius:3px;font-size:9px;font-weight:700;color:var(--gold);padding:1px 4px;line-height:1.3;}
.equip-info{flex:1;min-width:0;}
.equip-name{font-size:13px;font-weight:700;color:var(--txb);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.equip-slot-name{font-size:10px;color:var(--txd);letter-spacing:.5px;text-transform:uppercase;margin-top:1px;}
.equip-ilvl{font-family:'Cinzel',serif;font-size:15px;font-weight:700;color:var(--goldb);flex-shrink:0;}

/* ── PAPERDOLL LAYOUT ───────────────��������───────────────────── */
.paperdoll{display:grid;grid-template-columns:195px minmax(auto,340px) 195px;gap:6px;align-items:start;padding:4px 0;justify-content:center;}
@media(max-width:860px){.paperdoll{grid-template-columns:1fr;}}

.pd-col{display:flex;flex-direction:column;gap:4px;}
.pd-col-left{align-items:flex-end;}
.pd-col-right{align-items:flex-start;}

/* Jeden slot */
.pd-slot{display:flex;align-items:center;gap:7px;cursor:pointer;padding:3px 4px;border-radius:6px;
  transition:background .14s;width:100%;}
.pd-slot:hover{background:rgba(255,255,255,.06);}
.pd-slot-empty{opacity:.32;cursor:default;}
.pd-slot-empty:hover{background:none;}
.pd-slot-left{flex-direction:row-reverse;justify-content:flex-start;}
.pd-slot-right{flex-direction:row;}

/* Ikona slotu */
.pd-icon-wrap{position:relative;flex-shrink:0;width:46px;height:46px;border-radius:7px;
  border:2px solid rgba(200,164,94,.3);background:var(--bg0);overflow:visible;}
.pd-icon-ph{width:100%;height:100%;border-radius:5px;display:flex;align-items:center;
  justify-content:center;overflow:hidden;}
.pd-icon-ph img{width:100%;height:100%;object-fit:cover;border-radius:4px;display:block;}
.pd-ilvl-badge{position:absolute;bottom:-5px;right:-5px;background:var(--bg0);
  border:1px solid rgba(200,164,94,.4);border-radius:3px;font-size:9px;font-weight:700;
  color:var(--goldb);padding:1px 4px;line-height:1.3;white-space:nowrap;z-index:2;}

/* Label slotu */
.pd-label-wrap{flex:1;min-width:0;}
.pd-slot-left .pd-label-wrap{text-align:right;}
.pd-slot-right .pd-label-wrap{text-align:left;}
.pd-slot-name{
  font-size:9px;letter-spacing:1.4px;text-transform:uppercase;line-height:1.3;
  color:rgba(200,164,94,.75);
  text-shadow:0 0 8px rgba(200,164,94,.35);
  font-weight:700;
}
.pd-item-name{font-size:11px;font-weight:700;color:var(--txb);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px;line-height:1.3;margin-top:1px;}

/* Střed — portrét + info */
.pd-center{display:flex;flex-direction:column;align-items:center;gap:0;}
.pd-portrait{position:relative;width:100%;max-width:320px;aspect-ratio:3/5;
  border-radius:12px;overflow:hidden;background:var(--bg0);
  border:1px solid var(--brd);margin:0 auto;}
.pd-portrait img{width:100%;height:100%;object-fit:cover;object-position:top center;display:block;}
.pd-portrait-overlay{position:absolute;inset:0;
  background:linear-gradient(0deg,var(--bg2) 0%,transparent 40%);border-radius:0;}
.pd-char-info{width:100%;max-width:420px;margin:0 auto 12px;background:var(--bg3);
  border:1px solid var(--brd);border-radius:12px;
  padding:12px 14px 14px;text-align:center;}
.pd-char-name{font-family:'Cinzel',serif;font-size:19px;font-weight:700;color:#fff;
  text-shadow:0 2px 8px rgba(0,0,0,.6);line-height:1.1;}
.pd-char-spec{font-size:14px;font-weight:700;margin-top:4px;line-height:1.3;letter-spacing:.2px;}
.pd-char-sub{font-size:12px;color:var(--txb);margin-top:2px;line-height:1.4;}
.pd-char-realm{font-size:11px;color:var(--gold);margin-top:2px;opacity:.8;}
.pd-ilvl-row{display:flex;align-items:center;justify-content:center;gap:10px;
  margin-top:10px;background:var(--bg4);border-radius:8px;padding:9px 12px;border:1px solid var(--brd);}
.pd-ilvl-block{text-align:center;}
.pd-ilvl-num{font-family:'Cinzel',serif;font-size:22px;font-weight:700;color:var(--goldb);
  text-shadow:0 0 16px rgba(240,201,106,.4);line-height:1;}

.char-banner-sub{font-size:13px;color:var(--txb);margin-top:3px;text-shadow:0 1px 4px rgba(0,0,0,.9);letter-spacing:.2px;}

}

}

.spider-tooltip-row{

}

/* No bloodmallet data message */
.no-bloodmallet{

/* Equipment section wrapper */
.equip-section{

}

// Normalizuje jméno specu na icon slug (bez mezer, lowercase)
function specSlug(specName) {
  return specName.toLowerCase().replace(/\s+/g,'').replace(/[^a-z]/g,'');
}

// Vrátí <img> pro spec ikonu — ikony dle Warcraft Wiki (warcraft.wiki.gg)
function specIcon(specName, classId) {
  const clsNorm    = classId ? classId.replace(/-/g,'') : '';
  const clsFallback = `${ICO_BASE}classicon_${clsNorm || 'warrior'}.jpg`;
  if (!classId) return `<img class="si-img" src="${clsFallback}" alt="${specName}">`;

  const slug = specSlug(specName);  // "Beast Mastery" → "beastmastery"

  let iconKey;
  if (SPEC_ICONS[clsNorm] && SPEC_ICONS[clsNorm][slug]) {
    // Standardní spec — použij přesný název z Warcraft Wiki
    iconKey = SPEC_ICONS[clsNorm][slug];
  } else if (HERO_SPEC_ICONS[slug]) {
    // Hero talent spec — dedikovaná ikona
    iconKey = HERO_SPEC_ICONS[slug];
  } else {
    // Neznámý spec → fallback na class ikonu
    iconKey = null;
  }

  const iconSrc = iconKey ? `${ICO_BASE}${iconKey}.jpg` : clsFallback;

  return `<img class="si-img" src="${iconSrc}"
    onerror="this.onerror=null;this.src='${clsFallback}'"
    alt="${specName}" title="${specName}">`;
}

// Vrátí HTML pro spell ikonu — hledá v mapě, fallback = class ikona nebo placeholder
function spellIcon(spellName, classId) {
  const normalizedSpellName = spellName ? spellName.replace(/\s*\(PvP\)/i, '').trim() : '';
  const key = SPELL_ICONS[spellName] || SPELL_ICONS[normalizedSpellName];
  const clsNorm = classId ? classId.replace(/-/g,'') : '';
  const src = key
    ? `${ICO_BASE}${key}.jpg`
    : (clsNorm ? `${ICO_BASE}classicon_${clsNorm}.jpg` : null);

  if (!src) return `<div class="si si-ph">?</div>`;
  return `<img class="si si-img" src="${src}"
    onerror="this.onerror=null;this.src='${ICO_BASE}${clsNorm ? 'classicon_'+clsNorm : 'inv_misc_questionmark'}.jpg'"
    alt="${spellName||''}" title="${spellName||''}">`;
}

function cb(ch, ca) {
  if (ch === undefined) return '';
  const up = ch > 0;
  const lbl = ca || (up?'+':'')+ch+'%';
  return `<span class="cb ${up?'cup':'cdn'}">${up?'▲':'▼'} ${lbl}</span>`;
}
function bn(ch, ca) {
  if (ch === undefined) return '';
  const up = ch > 0;
  const lbl = ca || (up?'+':'')+ch+'%';
  return `<div class="bn ${up?'bup':'bdn'}">${up?'▲':'▼'} ${lbl}</div><div class="bnl">${up?'buff':'nerf'}</div>`;
}

function getTags(hf) {
  const t = new Set();
  Object.keys(hf.sections).forEach(s => {
    const l = s.toLowerCase();
    if(l.includes('class')) t.add('class');
    if(l.includes('raid')||l.includes('dungeon')) t.add('raid');
    if(l.includes('pvp')||l.includes('player versus')) t.add('pvp');
    if(l.includes('item')) t.add('items');
    if(l.includes('quest')) t.add('quest');
    if(l.includes('prof')) t.add('prof');
    if(l.includes('general')||l.includes('housing')||l.includes('delve')||l.includes('transmog')||l.includes('twilight')) t.add('gen');
  });
  // Detect pvp in class entries
  Object.values(hf.sections).forEach(subs =>
    Object.values(subs).forEach(es =>
      es.forEach(e => { if(e.spell && e.spell.includes('PvP')) t.add('pvp'); })
    )
  );
  return [...t];
}

function tagH(t) {
  const m={class:['tc','Třídy'],raid:['tr','Raidy'],pvp:['tp','PvP'],items:['ti','Předměty'],quest:['tq','Questy'],prof:['tf','Profese'],gen:['tg','Obecné']};
  const [cls,lbl]=m[t]||['tg',t];
  return `<span class="tag ${cls}">${lbl}</span>`;
}

// Get entries for a class from a specific hotfix
function getClassFromHotfix(id, hf) {
  const found = [];
  Object.entries(hf.sections).forEach(([, subs]) =>
    Object.entries(subs).forEach(([cn, es]) => {
      if (mCls(cn) === id) found.push(...es);
    })
  );
  return found;
}

// Get entries for a class from the newest hotfix that mentions it
function getLatestForClass(id) {
  for (const h of HF) {
    const found = getClassFromHotfix(id, h);
    if (found.length) return { title:h.title, url:h.url, entries:found };
  }
  return null;
}

// Get ALL hotfixes with entries for a class, grouped by hotfix
function getAllForClass(id) {
  const result = [];
  HF.forEach(h => {
    const entries = getClassFromHotfix(id, h);
    if (entries.length) result.push({ title:h.title, url:h.url, dateISO:h.dateISO, entries });
  });
  return result;
}

        const clsHTML = Object.entries(clsGroups).map(([cid, es]) => {

      // Non-classes sections

    }).join('');

function renderHotfixSection(entries, id) {
  const bySpec = groupBySpec(entries);
  return Object.entries(bySpec).map(([spec, entries]) => {
    const {b,n,f} = countBNF(entries);
    const countsHTML = [
      b ? `<span style="color:var(--g);font-size:10px;font-weight:700">▲${b}</span>` : '',
      n ? `<span style="color:var(--r);font-size:10px;font-weight:700">▼${n}</span>` : '',
      f ? `<span style="color:var(--b);font-size:10px;font-weight:700">🔧${f}</span>` : '',
    ].filter(Boolean).join(' ');

    const buffs  = entries.filter(e => !e.fix && e.ch > 0);
    const nerfs  = entries.filter(e => !e.fix && e.ch < 0);
    const fixes  = entries.filter(e => e.fix);
    const nonum  = entries.filter(e => !e.fix && e.ch === undefined);

    const renderRow = e => {
      const hasN = !e.fix && e.ch !== undefined;
      const ico = spellIcon(e.spell, id);
      return `<div class="sr">
        ${hasN ? `<div class="snum">${bn(e.ch,e.ca)}</div>` : e.fix ? `<div class="snum"><span class="cb cfx" style="font-size:11px">Fix</span></div>` : `<div class="snum"></div>`}
        ${ico}
        <div class="sinfo">
          ${e.spell ? `<div class="sname">${e.spell}</div>` : ''}
          <div class="sdesc">${e.text}</div>
        </div>
      </div>`;
    };

    let rows = '';
    if (buffs.length)  rows += `<div class="sort-sep buffs">▲ Buffy</div>` + buffs.map(renderRow).join('');
    if (nerfs.length)  rows += `<div class="sort-sep nerfs">▼ Nerfy</div>` + nerfs.map(renderRow).join('');
    if (nonum.length)  rows += nonum.map(renderRow).join('');
    if (fixes.length)  rows += `<div class="sort-sep fixes">🔧 Opravy</div>` + fixes.map(renderRow).join('');

    return `<div class="spec-block">
      <div class="spec-hd">
        ${specIcon(spec, id)}
        <span class="spec-hd-name">${spec}</span>
        <div class="spec-hd-counts">${countsHTML}</div>
      </div>
      ${rows}
    </div>`;
  }).join('');
}

function selCls(id) {
  document.querySelectorAll('.cbtn').forEach(b => b.classList.remove('sel'));
  document.querySelector(`.cbtn[onclick="selCls('${id}')"]`)?.classList.add('sel');
  const cls = CM2[id];
  const panel = document.getElementById('cdp');
  const latestHF = HF[0];
  const latestEntries = getClassFromHotfix(id, latestHF);
  const allHotfixes = getAllForClass(id);

  // ── Latest hotfix section ──
  let latestHTML = '';
  if (latestEntries.length) {
    latestHTML = renderHotfixSection(latestEntries, id);
    latestHTML += `<a class="orig-link" href="${latestHF.url}" target="_blank" rel="noopener">🔗 Zobrazit celý hotfix na Blizzard.com →</a>`;
  } else {
    latestHTML = `<p style="color:var(--txd);font-style:italic;padding:14px 0;">Žádné změny v posledním hotfixu.</p>`;
  }

  // ── Previous hotfixes sections ──
  let prevHTML = '';
  const prevHotfixes = allHotfixes.filter(h => h.title !== latestHF.title);
  if (prevHotfixes.length) {
    prevHTML = prevHotfixes.map(h => {
      const sectionBody = renderHotfixSection(h.entries, id);
      return `<div style="margin-top:8px;">
        <div class="stitle" style="margin-bottom:10px;font-size:13px;">${h.title}</div>
        ${sectionBody}
        <a class="orig-link" href="${h.url}" target="_blank" rel="noopener" style="font-size:11px;">🔗 Zobrazit hotfix →</a>
      </div>`;
    }).join('');
  }

  panel.innerHTML = `
    <div class="cdh">
      <div class="cdhbg" style="background-image:url('${cls.bg}')"></div>
      <div class="cdhgr"></div>
      <div class="cdhi">
        <div class="cdhn" style="color:${cls.color}">${cls.name}</div>
        <div class="cdhs">${latestHF.title.replace('Hotfixes: ','').replace('Class Tuning: ','')}</div>
      </div>
    </div>
    <div class="cdbody">
      <div style="background:linear-gradient(135deg,rgba(255,215,0,0.07),rgba(255,180,0,0.03));border:1px solid rgba(255,215,0,0.22);border-radius:10px;padding:16px 14px;margin-bottom:20px;">
        <div class="stitle" style="margin-bottom:14px;color:#ffd700;">⚡ Poslední hotfix: ${latestHF.title}</div>
        ${latestHTML}
      </div>
      ${prevHTML ? `<div style="margin-top:8px;">
        <div class="stitle" style="margin-bottom:16px;font-size:15px;color:var(--txd);">📜 Předchozí hotfixy</div>
        ${prevHTML}
      </div>` : ''}
    </div>`;
  panel.classList.add('on');
  panel.scrollIntoView({behavior:'smooth',block:'nearest'});
}

        // Sort: buffy, nerfy, fixy
        const buffs = ses.filter(e => !e.fix && e.ch > 0);
        const nerfs = ses.filter(e => !e.fix && e.ch < 0);
        const fixes = ses.filter(e => e.fix);
        const nonum = ses.filter(e => !e.fix && e.ch === undefined);
        const allSorted = [...buffs, ...nerfs, ...nonum, ...fixes];

// ── OAuth token ───────────────────────────────────────────
async function getToken() {
  if (charToken) return charToken;
  const creds = btoa(`${CHAR_CLIENT_ID}:${CHAR_CLIENT_SECRET}`);
  const res = await fetch(OAUTH_URL, {
    method: 'POST',
    headers: { 'Authorization': `Basic ${creds}`, 'Content-Type': 'application/x-www-form-urlencoded' },
    body: 'grant_type=client_credentials',
  });
  if (!res.ok) throw new Error(`OAuth chyba ${res.status}: ${res.statusText}`);
  charToken = (await res.json()).access_token;
  return charToken;
}

async function bApi(realm, path, ns = 'profile') {
  const token = await getToken();
  const url = new URL(API_BASE + path);
  url.searchParams.set('namespace', `${ns}-${CHAR_REGION}`);
  url.searchParams.set('locale', 'en_US');
  const res = await fetch(url, { headers: { 'Authorization': `Bearer ${token}` } });
  if (!res.ok) throw new Error(`API ${path} → ${res.status} ${res.statusText}`);
  return res.json();
}

function getBloodmalletPath(spec, className) {
  const key = `${(spec||'').toLowerCase()}_${(className||'').toLowerCase().replace(/\s+/g,'-')}`;
  if (key in BLOODMALLET_PATHS) return { key, path: BLOODMALLET_PATHS[key] };
  return { key, path: undefined }; // neznámá specc
}

function parseBloodmalletJSON(data) {
  // Bloodmallet secondary_distribution JSON:
  // sorted_data_keys: ["20_30_30_20", ...] — od nejlepšího
  // data_types: ["critical_strike","haste","mastery","versatility"] — pořadí hodnot v klíči
  const bestKey = data?.sorted_data_keys?.[0];
  if (!bestKey) return null;

  const parts = bestKey.split('_').map(Number);
  const types = data?.data_types || [];

  if (parts.length < 2) return null;

  // Detekuj pořadí ze data_types
  const idxCrit    = types.findIndex(t => /crit/i.test(t));
  const idxHaste   = types.findIndex(t => /haste/i.test(t));
  const idxMastery = types.findIndex(t => /master/i.test(t));
  const idxVers    = types.findIndex(t => /vers/i.test(t));

  // Fallback: předpokládáme pořadí crit/haste/mastery/vers
  const crit    = parts[idxCrit    >= 0 ? idxCrit    : 0] ?? 0;
  const haste   = parts[idxHaste   >= 0 ? idxHaste   : 1] ?? 0;
  const mastery = parts[idxMastery >= 0 ? idxMastery : 2] ?? 0;
  const vers    = parts[idxVers    >= 0 ? idxVers    : 3] ?? 0;

  // Normalizuj na 100 %
  const total = crit + haste + mastery + vers;
  if (total === 0) return null;
  const f = 100 / total;
  return {
    crit:    Math.round(crit    * f),
    haste:   Math.round(haste   * f),
    mastery: Math.round(mastery * f),
    vers:    Math.round(vers    * f),
    source:  'bloodmallet',
  };
}

async function fetchBloodmalletStats(spec, className, fightStyle = currentFightStyle) {
  const { key, path } = getBloodmalletPath(spec, className);
  const cacheKey = `${key}_${fightStyle}`;

  // Tankové/healerské specy — ihned null
  if (path === null) {
    BLOODMALLET_CACHE[cacheKey] = null;
    return null;
  }
  // Neznámá specc
  if (path === undefined) {
    BLOODMALLET_CACHE[cacheKey] = null;
    return null;
  }
  // Cache hit
  if (cacheKey in BLOODMALLET_CACHE) return BLOODMALLET_CACHE[cacheKey];

  const fightStylePath = FIGHT_STYLES[fightStyle] || 'castingpatchwerk';
  // Bloodmallet URL: secondary_distributions (s "s" na konci)
  // Použijeme CORS proxy kvůli CORS omezení bloodmallet.com
  const targetUrl = `https://bloodmallet.com/json/${path}/secondary_distributions/${fightStylePath}`;
  const url = `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`;

  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    console.log('[v0] Bloodmallet raw data for', cacheKey, ':', data);
    const parsed = parseBloodmalletJSON(data);
    console.log('[v0] Bloodmallet parsed for', cacheKey, ':', parsed);
    if (parsed) parsed.fightStyle = fightStyle;
    BLOODMALLET_CACHE[cacheKey] = parsed;
    return parsed;
  } catch(e) {
    console.warn(`[Bloodmallet] fetch failed for ${cacheKey}:`, e.message);
    // Fallback na hardcoded zálohu pokud existuje
    const fallback = BLOODMALLET_FALLBACK[key] ? { ...BLOODMALLET_FALLBACK[key], fightStyle } : null;
    BLOODMALLET_CACHE[cacheKey] = fallback;
    return fallback;
  }
}

  const promises = Object.keys(FIGHT_STYLES).map(fs => fetchBloodmalletStats(spec, className, fs));
  await Promise.all(promises);
}

// ═══ SPIDER CHART SVG GENERATOR ════════════════════════��═══════
function buildSpiderChart(currentStats, idealStats, chartId) {
  const size = 280;
  const center = size / 2;
  const maxRadius = 100;
  const labels = ['Haste', 'Mastery', 'Versatility', 'Critical Strike'];
  const rings = [0.25, 0.5, 0.75, 1.0];
  
  // Calculate total of current stats for percentage display
  const totalCurrent = currentStats.crit + currentStats.haste + currentStats.mastery + currentStats.vers;
  const currentPct = {
    crit: totalCurrent > 0 ? (currentStats.crit / totalCurrent * 100) : 0,
    haste: totalCurrent > 0 ? (currentStats.haste / totalCurrent * 100) : 0,
    mastery: totalCurrent > 0 ? (currentStats.mastery / totalCurrent * 100) : 0,
    vers: totalCurrent > 0 ? (currentStats.vers / totalCurrent * 100) : 0,
  };
  
  // Normalize stats to 0-100 scale (max stat value expected around 40%)
  const maxStatValue = 50; // 50% is max expected
  const normalizedCurrent = {
    haste: Math.min(100, (currentStats.haste / maxStatValue) * 100),
    mastery: Math.min(100, (currentStats.mastery / maxStatValue) * 100),
    vers: Math.min(100, (currentStats.vers / maxStatValue) * 100),
    crit: Math.min(100, (currentStats.crit / maxStatValue) * 100),
  };
  
  const normalizedIdeal = idealStats ? {
    haste: Math.min(100, (idealStats.haste / maxStatValue) * 100),
    mastery: Math.min(100, (idealStats.mastery / maxStatValue) * 100),
    vers: Math.min(100, (idealStats.vers / maxStatValue) * 100),
    crit: Math.min(100, (idealStats.crit / maxStatValue) * 100),
  } : null;
  
  // Points at 0, 90, 180, 270 degrees (top, right, bottom, left)
  // Order: Haste (top), Mastery (right), Versatility (bottom), Crit (left)
  const angles = [-90, 0, 90, 180]; // degrees
  const statOrder = ['haste', 'mastery', 'vers', 'crit'];
  const statLabels = { haste: 'Haste', mastery: 'Mastery', vers: 'Versatility', crit: 'Critical Strike' };
  
  function polarToCart(angle, radius) {
    const rad = (angle * Math.PI) / 180;
    return {
      x: center + radius * Math.cos(rad),
      y: center + radius * Math.sin(rad)
    };
  }
  
  // Build rings
  let ringsHTML = '';
  rings.forEach(r => {
    const radius = maxRadius * r;
    ringsHTML += `<circle cx="${center}" cy="${center}" r="${radius}" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>`;
  });
  
  // Build axis lines
  let axesHTML = '';
  angles.forEach(angle => {
    const end = polarToCart(angle, maxRadius);
    axesHTML += `<line x1="${center}" y1="${center}" x2="${end.x}" y2="${end.y}" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>`;
  });
  
  // Build labels
  let labelsHTML = '';
  const labelOffset = 18;
  labels.forEach((label, i) => {
    const pos = polarToCart(angles[i], maxRadius + labelOffset);
    const anchor = i === 1 ? 'start' : i === 3 ? 'end' : 'middle';
    const dy = i === 0 ? -5 : i === 2 ? 15 : 5;
    labelsHTML += `<text x="${pos.x}" y="${pos.y + dy}" text-anchor="${anchor}" fill="rgba(255,255,255,0.6)" font-size="11" font-weight="600" style="text-shadow:0 1px 3px rgba(0,0,0,0.8)">${label}</text>`;
  });
  
  // Build ideal polygon (golden) - only if idealStats exists
  let idealPolygon = '';
  if (normalizedIdeal) {
    const idealPoints = statOrder.map((stat, i) => {
      const radius = (normalizedIdeal[stat] / 100) * maxRadius;
      const p = polarToCart(angles[i], radius);
      return `${p.x},${p.y}`;
    }).join(' ');
    idealPolygon = `<polygon points="${idealPoints}" fill="url(#idealGrad-${chartId})" stroke="rgba(255,215,0,0.6)" stroke-width="1.5" stroke-dasharray="4,2"/>`;
  }
  
  // Build current polygon (cyan)
  const currentPoints = statOrder.map((stat, i) => {
    const radius = (normalizedCurrent[stat] / 100) * maxRadius;
    const p = polarToCart(angles[i], radius);
    return `${p.x},${p.y}`;
  }).join(' ');
  
  // Store data for tooltip
  const tooltipData = {
    current: currentStats,
    currentPct: currentPct,
    ideal: idealStats,
  };
  
  return `
    <svg class="spider-chart-svg" viewBox="0 0 ${size} ${size}" 
         data-tooltip='${JSON.stringify(tooltipData)}'
         onmouseenter="showSpiderTooltip(event, this)"
         onmousemove="moveSpiderTooltip(event)"
         onmouseleave="hideSpiderTooltip()">
      <defs>
        <linearGradient id="idealGrad-${chartId}" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:rgba(255,215,0,0.3)"/>
          <stop offset="100%" style="stop-color:rgba(255,180,0,0.1)"/>
        </linearGradient>
        <linearGradient id="currentGrad-${chartId}" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:rgba(0,217,255,0.4)"/>
          <stop offset="100%" style="stop-color:rgba(0,180,220,0.15)"/>
        </linearGradient>
      </defs>
      ${ringsHTML}
      ${axesHTML}
      ${idealPolygon}
      <polygon points="${currentPoints}" fill="url(#currentGrad-${chartId})" stroke="#00d9ff" stroke-width="2"/>
      ${labelsHTML}
    </svg>
  `;
}

function buildDetailHTML(id) {
  const state   = CHAR_STATE[id];

  const renderUrl = media?.assets?.find(a => a.key === 'main-raw')?.value
                 || media?.assets?.find(a => a.key === 'main')?.value || '';

  const slotMap = {};
  (equip.equipped_items || []).forEach(item => { slotMap[item.slot.type] = item; });

  const equippedIlvl = profile.equipped_item_level || '?';
  const avgIlvl      = profile.average_item_level   || '?';

  // Extract primary stats
  const primaryStats = {
    strength: stats.strength?.effective || 0,
    agility: stats.agility?.effective || 0,
    intellect: stats.intellect?.effective || 0,
    stamina: stats.stamina?.effective || 0,
  };
  
  // Extract secondary stats (ratings and percentages)
  // Blizzard API structure: stats have both value (percentage) and rating (raw number)
  // Example: melee_crit: { rating: 1234, rating_bonus: 5.67, value: 12.34 }
  
  // Helper: ze všech zdrojů pro daný stat vyber ten s NEJVYŠŠÍM ratingem.
  // Blizzard API vrací: { rating_bonus: X, value: Y, rating_normalized: Z }
  // - rating_normalized = raw rating číslo (např. 443)
  // - rating_bonus = procentuální bonus z ratingu (např. 9.63%)
  // - value = celková procentuální hodnota včetně base (např. 19.63%)
  const pickBestStat = (sources) => {
    let best = { value: 0, rating: 0 };
    for (const src of sources) {
      if (!src || typeof src !== 'object') continue;
      // Blizzard používá rating_normalized pro raw rating
      const r = src.rating_normalized ?? src.rating ?? 0;
      const v = src.value ?? 0;
      // Preferuj zdroj s vyšším ratingem; při shodě (oba 0) preferuj vyšší value
      if (r > best.rating || (r === best.rating && v > best.value)) {
        best = { value: v, rating: r };
      }
    }
    return best;
  };

  const getCrit    = () => pickBestStat([stats.melee_crit, stats.spell_crit, stats.ranged_crit]);
  const getHaste   = () => pickBestStat([stats.melee_haste, stats.spell_haste, stats.ranged_haste]);
  const getMastery = () => {
    if (stats.mastery && typeof stats.mastery === 'object') {
      return { 
        value: stats.mastery.value ?? 0, 
        rating: stats.mastery.rating_normalized ?? stats.mastery.rating ?? 0 
      };
    }
    return { value: 0, rating: 0 };
  };
  
  const getVers = () => ({
    value:  stats.versatility_damage_done_bonus ?? 0,

        <div class="secondary-stat-row">
          <div class="secondary-stat-color" style="background:#4dabf7"></div>
          <div class="secondary-stat-name">Haste</div>
          <div class="secondary-stat-value">${secondaryStats.hasteRating.toLocaleString()}</div>
          <div class="secondary-stat-pct">${secondaryStats.haste.toFixed(2)}%</div>
        </div>
        <div class="secondary-stat-row">
          <div class="secondary-stat-color" style="background:#69db7c"></div>
          <div class="secondary-stat-name">Mastery</div>
          <div class="secondary-stat-value">${secondaryStats.masteryRating.toLocaleString()}</div>
          <div class="secondary-stat-pct">${secondaryStats.mastery.toFixed(2)}%</div>
        </div>
        <div class="secondary-stat-row">
          <div class="secondary-stat-color" style="background:#da77f2"></div>
          <div class="secondary-stat-name">Versatility</div>
          <div class="secondary-stat-value">${secondaryStats.versRating.toLocaleString()}</div>
          <div class="secondary-stat-pct">${secondaryStats.vers.toFixed(2)}%</div>
        </div>
      </div>
    </div>
  `;

  const charInfo = `
    <div class="pd-char-info">
      <div class="pd-char-name">${profile.name}</div>
      <div class="pd-char-spec" style="color:${classColor};text-shadow:0 0 14px ${classColor}55;">
        ${profile.active_spec?.name||''} ${profile.character_class?.name||''}
      </div>
      <div class="pd-char-sub">${profile.race?.name||''} · Level ${profile.level}</div>
      <div class="pd-char-realm">⚔ ${profile.realm?.name||"Drak'thul"} · ${profile.faction?.name||''}</div>
      <div class="pd-ilvl-row">
        <div class="pd-ilvl-block">
          <div class="pd-ilvl-num">${equippedIlvl}</div>
          <div class="pd-ilvl-lbl">Equipped</div>
        </div>
        <div class="pd-ilvl-sep">·</div>
        <div class="pd-ilvl-block">
          <div class="pd-ilvl-num" style="color:var(--tx);font-size:18px">${avgIlvl}</div>
          <div class="pd-ilvl-lbl">Average</div>
        </div>
      </div>
    </div>`;

  const portrait = `
    <div class="pd-center">
      <div class="pd-portrait">
        ${renderUrl
          ? `<img src="${renderUrl}" alt="${profile.name}" onerror="this.style.display='none'">`
          : `<div style="height:100%;display:flex;align-items:center;justify-content:center;font-size:60px;color:var(--txd)">👤</div>`}
        <div class="pd-portrait-overlay"></div>
      </div>
    </div>`;

  const equipmentSection = `
    <div class="equip-section">
      ${charInfo}
      <div class="paperdoll">
        <div class="pd-col pd-col-left">${leftCol}</div>
        ${portrait}
        <div class="pd-col pd-col-right">${rightCol}</div>
        <div class="pd-weapons">${weaponsRow}</div>
      </div>
    </div>
  `;

  return `<div class="char-detail-inner">
    <div class="char-detail-layout">
      ${statsPanel}
      ${equipmentSection}
    </div>
  </div>`;
}

// ═══ WoW ITEM TOOLTIP ══════════════════════════════════��═
const tip = document.getElementById('wow-tip');

function showTip(e, el) {
  try {
    const item = JSON.parse(decodeURIComponent(el.dataset.tip));
    tip.innerHTML = buildTooltipHTML(item);
    tip.style.display = 'block';
    moveTip(e);
  } catch(err) { /* nezdařilo se */ }
}

function moveTip(e) {
  const pad = 16;
  const tw  = tip.offsetWidth  || 280;
  const th  = tip.offsetHeight || 200;
  let   x   = e.clientX + pad;
  let   y   = e.clientY + pad;
  if (x + tw > window.innerWidth  - pad) x = e.clientX - tw - pad;
  if (y + th > window.innerHeight - pad) y = e.clientY - th - pad;
  tip.style.left = x + 'px';
  tip.style.top  = y + 'px';
}

function hideTip() {
  tip.style.display = 'none';
}

// ═══ SPIDER CHART TOOLTIP ════════════════════════════════════
const spiderTip = document.getElementById('spider-tip');

function showSpiderTooltip(e, el) {
  try {
    const data = JSON.parse(el.dataset.tooltip);
    spiderTip.innerHTML = buildSpiderTooltipHTML(data);
    spiderTip.style.display = 'block';
    moveSpiderTooltip(e);
  } catch(err) { console.error('[v0] Spider tooltip error:', err); }
}

function moveSpiderTooltip(e) {
  const pad = 16;
  const tw  = spiderTip.offsetWidth  || 220;
  const th  = spiderTip.offsetHeight || 200;
  let   x   = e.clientX + pad;
  let   y   = e.clientY + pad;
  if (x + tw > window.innerWidth  - pad) x = e.clientX - tw - pad;
  if (y + th > window.innerHeight - pad) y = e.clientY - th - pad;
  spiderTip.style.left = x + 'px';
  spiderTip.style.top  = y + 'px';
}

function hideSpiderTooltip() {
  spiderTip.style.display = 'none';
}

// Změna fight style a překreslení spider chartu
async function changeFightStyle(style, charId) {
  currentFightStyle = style;
  
  // Update active button
  const toggleContainer = document.querySelector(`.fight-style-toggle[data-char-id="${charId}"]`);
  if (toggleContainer) {
    toggleContainer.querySelectorAll('.fight-style-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.style === style);
    });
  }
  
  // Získej data postavy
  const state = CHAR_STATE[charId];
  if (!state?.profileData) return;
  
  const profile = state.profileData;
  const stats = state.statsData || {};
  const spec = profile.active_spec?.name;
  const className = profile.character_class?.name;
  
  // Fetch nová bloodmallet data pro vybraný fight style
  await fetchBloodmalletStats(spec, className, style);
  
  // Získej nová ideal stats
  const idealStats = getIdealStats(spec, className, style);
  
  // Získej current secondary stats - pomocne funkce pro ziskani nejlepsi hodnoty
  const pickBest = (sources) => {
    let best = { value: 0, rating: 0 };
    for (const src of sources) {
      if (!src || typeof src !== 'object') continue;
      const r = src.rating_normalized ?? src.rating ?? 0;
      const v = src.value ?? 0;
      if (r > best.rating || (r === best.rating && v > best.value)) {
        best = { value: v, rating: r };
      }
    }
    return best.value;
  };
  
  const critVal = pickBest([stats.melee_crit, stats.spell_crit, stats.ranged_crit]);
  const hasteVal = pickBest([stats.melee_haste, stats.spell_haste, stats.ranged_haste]);
  const masteryVal = stats.mastery?.value ?? 0;
  const versVal = stats.versatility_damage_done_bonus ?? 0;
  
  // secondaryStats pro spider chart - hodnoty v procentech
  const secondaryStats = {
    crit: critVal,
    haste: hasteVal,
    mastery: masteryVal,
    vers: versVal,
  };
  
  console.log('[v0] changeFightStyle:', { style, charId, secondaryStats, idealStats });
  
  // Překresli spider chart
  const spiderWrap = document.getElementById(`spider-wrap-${charId}`);
  if (spiderWrap && idealStats) {
    spiderWrap.innerHTML = buildSpiderChart(secondaryStats, idealStats, charId);
  }
}

function buildSpiderTooltipHTML(data) {
  const { current, currentPct, ideal } = data;
  
  let html = `<div class="spider-tooltip-title">Secondary Stat Distribution</div>`;
  
  // Current stats section
  html += `<div class="spider-tooltip-section">
    <div class="spider-tooltip-label current">Your Stats</div>
    <div class="spider-tooltip-row"><span>Critical Strike</span><span>${current.crit.toFixed(1)}% (${currentPct.crit.toFixed(0)}%)</span></div>
    <div class="spider-tooltip-row"><span>Haste</span><span>${current.haste.toFixed(1)}% (${currentPct.haste.toFixed(0)}%)</span></div>
    <div class="spider-tooltip-row"><span>Mastery</span><span>${current.mastery.toFixed(1)}% (${currentPct.mastery.toFixed(0)}%)</span></div>
    <div class="spider-tooltip-row"><span>Versatility</span><span>${current.vers.toFixed(1)}% (${currentPct.vers.toFixed(0)}%)</span></div>
  </div>`;
  
  // Ideal stats section (only if available)
  if (ideal) {
    html += `<div class="spider-tooltip-section">
      <div class="spider-tooltip-label ideal">Ideal (Bloodmallet)</div>
      <div class="spider-tooltip-row"><span>Critical Strike</span><span>${ideal.crit}%</span></div>
      <div class="spider-tooltip-row"><span>Haste</span><span>${ideal.haste}%</span></div>
      <div class="spider-tooltip-row"><span>Mastery</span><span>${ideal.mastery}%</span></div>
      <div class="spider-tooltip-row"><span>Versatility</span><span>${ideal.vers}%</span></div>
    </div>`;
  }
  
  return html;
}

function buildTooltipHTML(item) {
  const qCls   = qualityClass(item.quality?.type);
  const name   = item.name || 'Neznámý předmět';
  const ilvl   = item.level?.value || '?';
  const slotLbl = SLOT_ORDER.find(s => s.key === item.slot?.type)?.label || item.slot?.type || '';
  const subclass = item.item_subclass?.name || '';

  let html = `<div class="tip-name ${qCls}">${name}</div>`;
  html += `<div class="tip-ilvl">
    Item Level ${ilvl}
    <span class="tip-slot-type">${slotLbl}${subclass ? ' · '+subclass : ''}</span>
  </div>`;

  // ── Staty ──────────────────────────────────────────────
  const stats = item.stats || [];
  if (stats.length) {
    html += `<div class="tip-section">`;
    stats.forEach(s => {
      const disp = s.display?.display_string || `${s.value > 0 ? '+' : ''}${s.value} ${s.type?.name || ''}`;
      const isHighlight = s.is_equip_bonus || s.type?.type === 'ITEM_LEVEL';
      html += `<div class="tip-stat${isHighlight ? ' highlight' : ''}">${disp}</div>`;
    });
    html += `</div>`;
  }

  // ── Enchanty ───────────────────────────────────────────
  const enchants = item.enchantments || [];
  if (enchants.length) {
    html += `<div class="tip-section">`;
    enchants.forEach(e => {
      const txt = e.display_string || e.enchantment_id || '';
      if (txt) html += `<div class="tip-enchant">✦ ${txt}</div>`;
    });
    html += `</div>`;
  }

  // ── Gemy / sockety ─────────────────────────────────────
  const sockets = item.sockets || [];
  if (sockets.length) {
    html += `<div class="tip-section">`;
    sockets.forEach(s => {
      const gemName = s.item?.name || null;
      const sockType = s.socket_type?.type || 'Socket';
      if (gemName) {
        html += `<div class="tip-gem">◆ ${gemName}</div>`;
      } else {
        html += `<div class="tip-gem" style="opacity:.45">◆ Prázdný ${sockType.toLowerCase()} socket</div>`;
      }
    });
    html += `</div>`;
  }

  // ── Kouzla / on-equip efekty ───────────────────────────
  const spells = item.spells || [];
  if (spells.length) {
    html += `<div class="tip-section">`;
    spells.forEach(s => {
      const desc = s.description || s.spell?.name || '';
      if (desc) html += `<div class="tip-spell">${desc}</div>`;
    });
    html += `</div>`;
  }

  // ── Set bonus ──────────────────────────────────────────
  if (item.set) {
    html += `<div class="tip-section">`;
    html += `<div class="tip-set">Sada: ${item.set.item_set?.name || ''}</div>`;
    (item.set.effects || []).forEach(ef => {
      html += `<div class="tip-set" style="opacity:.7;font-size:11px">(${ef.required_count}) ${ef.display_string || ''}</div>`;
    });
    html += `</div>`;
  }

  // ── Popis (flavor text) ────────────────────────────────
  if (item.description) {
    html += `<div class="tip-flavor">"${item.description}"</div>`;
  }

  // ── Požadavky ──────────────────────────────────────────
  const reqs = [];
  if (item.requirements?.level?.display_string) reqs.push(item.requirements.level.display_string);
  if (item.requirements?.faction?.display_string) reqs.push(item.requirements.faction.display_string);
  if (reqs.length) html += `<div class="tip-req">${reqs.join(' · ')}</div>`;

  return html;
}

async function loadItemIcon(elId, mediaHref) {
  const el = document.getElementById(elId);
  if (!el || !mediaHref) return;
  try {
    const token = await getToken();
    const url   = new URL(mediaHref);
    url.searchParams.set('namespace', `static-${CHAR_REGION}`);
    const res   = await fetch(url, { headers: { 'Authorization': `Bearer ${token}` } });
    if (!res.ok) return;
    const data  = await res.json();
    const iconUrl = data.assets?.find(a => a.key === 'icon')?.value;
    const fresh = document.getElementById(elId);
    if (iconUrl && fresh) {
      fresh.innerHTML = `<img src="${iconUrl}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:4px;display:block;" onerror="this.style.display='none'">`;
    }
  } catch(e) { /* ikona nedostupná */ }
}
